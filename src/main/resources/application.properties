spring.application.name=pronosticup-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Schedulers

app.schedulers.tournament-sync.enabled=${APP_SCHEDULERS_TOURNAMENT_SYNC_ENABLED:false}
app.schedulers.score-batch.enabled=${APP_SCHEDULERS_SCORE_BATCH_ENABLED:false}
app.scores.use-local-snapshots=${APP_SCORES_USE_LOCAL_SNAPSHOTS:false}

# Logging

logging.level.root=INFO
logging.level.SCORE_BATCH=INFO

# Football Data

football-data.base-url=http://api.football-data.org
football-data.competition.world-cup=2000
football-data.competition.euro-cup=2018

#BREVO API

brevo.api.url=https://api.brevo.com/v3/smtp/email
brevo.api.key=${BREVO_API_KEY:}
